name: ci

on:
  push:
    branches: [main]
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-python@v6
        with:
          python-version: "3.11"
      - run: python -m pip install -e ".[dev]"
      - run: ruff check .
      - run: pytest -q
      - run: python evals/run.py

  console:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: web
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-node@v6
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: web/package-lock.json
      - run: npm ci
      - run: npm run build

  kind-e2e:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-python@v6
        with:
          python-version: "3.11"
      - name: Install kind
        run: |
          curl --fail --location --output kind \
            https://kind.sigs.k8s.io/dl/v0.32.0/kind-linux-amd64
          chmod +x kind
          sudo mv kind /usr/local/bin/kind
      - run: python -m pip install -e "."
      - run: scripts/e2e-kind.sh

  observability-e2e:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-python@v6
        with:
          python-version: "3.11"
      - name: Install kind
        run: |
          curl --fail --location --output kind \
            https://kind.sigs.k8s.io/dl/v0.32.0/kind-linux-amd64
          chmod +x kind
          sudo mv kind /usr/local/bin/kind
      - run: python -m pip install -e "."
      - run: scripts/e2e-observability.sh
