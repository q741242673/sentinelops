name: ci

on:
  push:
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - run: python -m pip install -e ".[dev]"
      - run: ruff check .
      - run: pytest -q
      - run: python evals/run.py

  kind-e2e:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install kind
        run: |
          curl --fail --location --output kind \
            https://kind.sigs.k8s.io/dl/v0.32.0/kind-linux-amd64
          chmod +x kind
          sudo mv kind /usr/local/bin/kind
      - run: python -m pip install -e "."
      - run: scripts/e2e-kind.sh
