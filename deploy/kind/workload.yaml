apiVersion: v1
kind: Namespace
metadata:
  name: sentinelops-demo
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: order-service
  namespace: sentinelops-demo
  labels:
    app: order-service
spec:
  replicas: 1
  revisionHistoryLimit: 5
  progressDeadlineSeconds: 60
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 1
      maxUnavailable: 0
  selector:
    matchLabels:
      app: order-service
  template:
    metadata:
      labels:
        app: order-service
      annotations:
        sentinelops.io/version: "1.0.0"
    spec:
      containers:
        - name: order-service
          image: nginx:1.27-alpine
          ports:
            - name: http
              containerPort: 80
          readinessProbe:
            httpGet:
              path: /
              port: http
            initialDelaySeconds: 1
            periodSeconds: 2
          resources:
            requests:
              cpu: 10m
              memory: 16Mi
            limits:
              cpu: 100m
              memory: 64Mi
---
apiVersion: v1
kind: Service
metadata:
  name: order-service
  namespace: sentinelops-demo
spec:
  selector:
    app: order-service
  ports:
    - name: http
      port: 80
      targetPort: http

