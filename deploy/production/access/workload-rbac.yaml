apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: sentinelops-api-readonly
  namespace: sentinelops-workloads
rules:
  - apiGroups: [""]
    resources: ["pods", "pods/log", "events"]
    verbs: ["get", "list", "watch"]
  - apiGroups: ["apps"]
    resources: ["deployments", "deployments/status", "deployments/scale", "replicasets"]
    verbs: ["get", "list", "watch"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: sentinelops-executor-write
  namespace: sentinelops-workloads
rules:
  - apiGroups: ["apps"]
    resources: ["deployments", "deployments/status", "deployments/scale"]
    verbs: ["get", "list", "watch", "patch", "update"]
  - apiGroups: ["apps"]
    resources: ["replicasets"]
    verbs: ["get", "list", "watch"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: sentinelops-api-readonly
  namespace: sentinelops-workloads
subjects:
  - kind: ServiceAccount
    name: sentinelops-api
    namespace: sentinelops-system
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: Role
  name: sentinelops-api-readonly
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: sentinelops-executor-write
  namespace: sentinelops-workloads
subjects:
  - kind: ServiceAccount
    name: sentinelops-executor
    namespace: sentinelops-system
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: Role
  name: sentinelops-executor-write
