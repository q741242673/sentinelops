apiVersion: apps/v1
kind: Deployment
metadata:
  name: sentinelops-executor
  namespace: sentinelops-system
  labels:
    app.kubernetes.io/name: sentinelops-executor
    app.kubernetes.io/part-of: sentinelops
spec:
  replicas: 2
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxUnavailable: 0
      maxSurge: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: sentinelops-executor
  template:
    metadata:
      labels:
        app.kubernetes.io/name: sentinelops-executor
        app.kubernetes.io/part-of: sentinelops
    spec:
      serviceAccountName: sentinelops-executor
      automountServiceAccountToken: true
      terminationGracePeriodSeconds: 60
      securityContext:
        runAsNonRoot: true
        runAsUser: 65532
        runAsGroup: 65532
        fsGroup: 65532
        seccompProfile:
          type: RuntimeDefault
      topologySpreadConstraints:
        - maxSkew: 1
          topologyKey: kubernetes.io/hostname
          whenUnsatisfiable: ScheduleAnyway
          labelSelector:
            matchLabels:
              app.kubernetes.io/name: sentinelops-executor
      containers:
        - name: executor
          image: ghcr.io/your-org/sentinelops:0.1.0
          imagePullPolicy: IfNotPresent
          args: ["executor"]
          envFrom:
            - configMapRef:
                name: sentinelops-runtime
          env:
            - name: SENTINELOPS_EXECUTOR_HEALTH_FILE
              value: /var/run/sentinelops/health/heartbeat
          startupProbe:
            exec:
              command:
                - sentinelops
                - executor-health
                - --max-age-seconds
                - "120"
            periodSeconds: 5
            timeoutSeconds: 5
            failureThreshold: 36
          livenessProbe:
            exec:
              command:
                - sentinelops
                - executor-health
                - --max-age-seconds
                - "120"
            periodSeconds: 20
            timeoutSeconds: 3
            failureThreshold: 3
          readinessProbe:
            exec:
              command:
                - sentinelops
                - executor-health
                - --max-age-seconds
                - "120"
            periodSeconds: 10
            timeoutSeconds: 3
            failureThreshold: 2
          resources:
            requests:
              cpu: 100m
              memory: 256Mi
            limits:
              cpu: "1"
              memory: 768Mi
          securityContext:
            allowPrivilegeEscalation: false
            capabilities:
              drop: ["ALL"]
            readOnlyRootFilesystem: true
          volumeMounts:
            - name: runtime-secret
              mountPath: /var/run/secrets/sentinelops
              readOnly: true
            - name: executor-health
              mountPath: /var/run/sentinelops/health
            - name: tmp
              mountPath: /tmp
      volumes:
        - name: runtime-secret
          projected:
            defaultMode: 288
            sources:
              - secret:
                  name: sentinelops-runtime
                  items:
                    - key: database-url
                      path: database-url
                    - key: audit-hmac-key
                      path: audit-hmac-key
        - name: executor-health
          emptyDir: {}
        - name: tmp
          emptyDir: {}
