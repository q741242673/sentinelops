apiVersion: batch/v1
kind: Job
metadata:
  name: sentinelops-topology-migrate
  namespace: sentinelops-system
spec:
  activeDeadlineSeconds: 300
  backoffLimit: 1
  template:
    metadata:
      labels:
        app.kubernetes.io/name: sentinelops-topology-migrator
    spec:
      serviceAccountName: sentinelops-migrator
      automountServiceAccountToken: false
      restartPolicy: Never
      securityContext:
        runAsNonRoot: true
        runAsUser: 65532
        runAsGroup: 65532
        seccompProfile:
          type: RuntimeDefault
      containers:
        - name: migrate
          image: sentinelops:topology-e2e
          imagePullPolicy: Never
          args: ["db-init"]
          env:
            - name: SENTINELOPS_DATABASE_URL
              valueFrom:
                secretKeyRef:
                  name: sentinelops-topology-secrets
                  key: database-url
          securityContext:
            allowPrivilegeEscalation: false
            capabilities:
              drop: ["ALL"]
            readOnlyRootFilesystem: true
          resources:
            requests:
              cpu: 50m
              memory: 128Mi
            limits:
              cpu: 500m
              memory: 512Mi
          volumeMounts:
            - name: tmp
              mountPath: /tmp
      volumes:
        - name: tmp
          emptyDir: {}
